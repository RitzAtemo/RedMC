name: RedMC-Cosmetics
description: RedMC - Cosmetics
version: '0.0.1-alpha'
api-version: '1.21.11'
prefix: RedMC
folia-supported: true
main: red.aviora.redmc.cosmetics.CosmeticsPlugin
bootstrapper: red.aviora.redmc.cosmetics.CosmeticsBootstrap
dependencies:
  server:
    RedMC-API:
      load: BEFORE
      required: true
      join-classpath: true
    RedMC-Placeholders:
      load: BEFORE
      required: true
      join-classpath: true
permissions:
  redmc.cosmetics:
    default: op
  redmc.cosmetics.equip:
    default: op
  redmc.cosmetics.toggle:
    default: op
  redmc.cosmetics.list:
    default: op
  redmc.cosmetics.create:
    default: op
  redmc.cosmetics.delete:
    default: op
  redmc.cosmetics.edit:
    default: op
  redmc.cosmetics.export:
    default: op
  redmc.cosmetics.import:
    default: op
  redmc.cosmetics.admin:
    default: op
  redmc.cosmetics.reload:
    default: op
  redmc.cosmetics.reload.config:
    default: op
  redmc.cosmetics.reload.data:
    default: op
  redmc.cosmetics.reload.all:
    default: op
