name: RedMC-Scoreboard
description: RedMC - Sidebar Scoreboard Customization
version: '1.0'
api-version: '1.21.11'
prefix: RedMC
folia-supported: true
main: red.aviora.redmc.scoreboard.ScoreboardPlugin
bootstrapper: red.aviora.redmc.scoreboard.ScoreboardBootstrap
dependencies:
  server:
    RedMC-API:
      load: BEFORE
      required: true
      join-classpath: true
    RedMC-Placeholders:
      load: BEFORE
      required: true
      join-classpath: true
permissions:
  redmc.scoreboard:
    default: true
  redmc.scoreboard.reload:
    default: op
  redmc.scoreboard.toggle:
    default: true
