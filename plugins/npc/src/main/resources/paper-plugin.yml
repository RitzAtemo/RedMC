name: RedMC-NPC
description: RedMC-NPC
version: '0.1.0-beta'
api-version: '1.21.11'
prefix: RedMC
folia-supported: true
main: red.aviora.redmc.npc.NpcPlugin
bootstrapper: red.aviora.redmc.npc.NpcBootstrap
dependencies:
  server:
    RedMC-API:
      load: BEFORE
      required: true
      join-classpath: true
permissions:
  redmc.npc:
    default: op
  redmc.npc.create:
    default: op
  redmc.npc.read:
    default: op
  redmc.npc.delete:
    default: op
  redmc.npc.reload:
    default: op
  redmc.npc.reload.config:
    default: op
  redmc.npc.reload.data:
    default: op
  redmc.npc.reload.all:
    default: op
  redmc.npc.update.name:
    default: op
  redmc.npc.update.skin:
    default: op
  redmc.npc.update.teleport:
    default: op
  redmc.npc.update.equipment:
    default: op
  redmc.npc.update.commands:
    default: op
