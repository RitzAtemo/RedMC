npc-already-exists: "%prefix%<#FF6B6B>NPC with id '<#F0F8FF>%id%<#FF6B6B>' already exists."
npc-created: "%prefix%<#3DDC97>NPC '<#F0F8FF>%id%<#3DDC97>' created at your location."
