  only-players: "%prefix%<#FF6B6B>This command can only be used by players."
  player-not-found: "%prefix%<#FF6B6B>Player '<#F0F8FF>%name%<#FF6B6B>' not found."

success: "%prefix%<#3DDC97>Done."
