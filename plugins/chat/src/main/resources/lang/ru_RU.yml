prefix: "<#1E90FF>[<#FF4500>Чат<#1E90FF>]<#F0F8FF> "

error.no-permission: "%prefix%<#FF6B6B>У вас нет прав для использования этой команды."

chat:
  no-target: "%prefix%<#FF6B6B>Игрок не найден."
  no-reply-target: "%prefix%<#FF6B6B>Некому ответить."
  only-players: "%prefix%<#FF6B6B>Только игроки могут использовать эту команду."
  reload-config-success: "%prefix%<#3DDC97>Конфигурация чата перезагружена."
  reload-alerts-success: "%prefix%<#3DDC97>Оповещения чата перезагружены."
  reload-all-success: "%prefix%<#3DDC97>Конфигурация и оповещения чата перезагружены."
  msg-sent: "<#9b94a6>[<#F0F8FF>→ %target%<#9b94a6>]<#F0F8FF> %message%"
  msg-received: "<#9b94a6>[<#F0F8FF>%sender% →<#9b94a6>]<#F0F8FF> %message%"
  reply-sent: "<#9b94a6>[<#F0F8FF>→ %target%<#9b94a6>]<#F0F8FF> %message% <#888888>(↩ \"%quoted%\")"
  reply-received: "<#9b94a6>[<#F0F8FF>%sender% →<#9b94a6>]<#F0F8FF> %message% <#888888>(↩ \"%quoted%\")"

join-leave:
  join: "<#3DDC97>+<#F0F8FF> %player% <#9b94a6>зашёл на сервер"
  leave: "<#FF6B6B>-<#F0F8FF> %player% <#9b94a6>вышел с сервера"

death:
  groups:
    default:
      messages:
        - "<#9b94a6>%player% умер"
        - "<#9b94a6>%player% пал"
        - "<#9b94a6>%player% встретил свою судьбу"
    by_player:
      messages:
        - "<#FF6B6B>%player%<#9b94a6> был убит игроком <#FFB800>%killer%"
        - "<#FFB800>%killer%<#9b94a6> победил <#FF6B6B>%player%"
        - "<#FF6B6B>%player%<#9b94a6> не выжил против <#FFB800>%killer%"
    by_player_weapon:
      messages:
        - "<#FF6B6B>%player%<#9b94a6> был убит игроком <#FFB800>%killer%<#9b94a6> с помощью <#F0F8FF>%weapon%"
        - "<#FFB800>%killer%<#9b94a6> победил <#FF6B6B>%player%<#9b94a6>, используя <#F0F8FF>%weapon%"
        - "<#FF6B6B>%player%<#9b94a6> не выжил против <#FFB800>%killer%<#9b94a6> с <#F0F8FF>%weapon%"
    by_fall:
      messages:
        - "<#9b94a6>%player% упал с высоты"
        - "<#9b94a6>%player% не выдержал урона от падения"
        - "<#9b94a6>%player% забыл, что не умеет летать"
    by_fire:
      messages:
        - "<#FF6B6B>%player%<#9b94a6> сгорел заживо"
        - "<#9b94a6>%player% был поглощён пламенем"
        - "<#FF6B6B>%player%<#9b94a6> почувствовал жар"
    by_lava:
      messages:
        - "<#FF6B6B>%player%<#9b94a6> попытался поплавать в лаве"
        - "<#9b94a6>%player% узнал, что лава — это не вода"
        - "<#FF6B6B>%player%<#9b94a6> принял лавовую ванну"
    by_drowning:
      messages:
        - "<#1E90FF>%player%<#9b94a6> утонул"
        - "<#9b94a6>%player% забыл, как дышать"
        - "<#1E90FF>%player%<#9b94a6> закончился воздух"
    by_explosion:
      messages:
        - "<#9b94a6>%player% взорвался"
        - "<#9b94a6>%player% был разнесён на куски"
        - "<#9b94a6>%player% не оценил радиус взрыва"
    by_void:
      messages:
        - "<#9b94a6>%player% упал в пустоту"
        - "<#888888>%player% исчез в бездне"
        - "<#9b94a6>%player% попрощался с миром"
    by_entity:
      messages:
        - "<#9b94a6>%player% был убит <#FF6B6B>%killer%"
        - "<#FF6B6B>%killer%<#9b94a6> прервал путь %player%"
        - "<#9b94a6>%player% был не готов к <#FF6B6B>%killer%"
    by_magic:
      messages:
        - "<#C780FA>%player%<#9b94a6> был убит магией"
        - "<#9b94a6>%player% стал жертвой колдовства"
    by_wither:
      messages:
        - "<#9b94a6>%player% иссох"
        - "<#888888>%player%<#9b94a6> поддался иссушению"
    by_starve:
      messages:
        - "<#9b94a6>%player% умер от голода"
        - "<#9b94a6>%player% забыл поесть"
    by_lightning:
      messages:
        - "<#FFB800>%player%<#9b94a6> был поражён молнией"
        - "<#9b94a6>%player% получил незабываемый опыт"

advancement:
  task: "<#9b94a6>[<#3DDC97>Достижение<#9b94a6>]<#F0F8FF> %player%<#9b94a6> получил достижение <#F0F8FF>[<#3DDC97>%title%<#F0F8FF>]"
  goal: "<#9b94a6>[<#1E90FF>Достижение<#9b94a6>]<#F0F8FF> %player%<#9b94a6> достиг цели <#1E90FF>[<#F0F8FF>%title%<#1E90FF>]"
  challenge: "<#9b94a6>[<#FFB800>Достижение<#9b94a6>]<#F0F8FF> %player%<#9b94a6> выполнил испытание <#FFB800>[<#F0F8FF>%title%<#FFB800>]"
