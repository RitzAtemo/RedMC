prefix: "<#1E90FF>[<#FF1493>Chat<#1E90FF>]<#F0F8FF> "

error:
  no-permission: "%prefix%<#FF6B6B>You don't have permission to use this."
  only-players: "%prefix%<#FF6B6B>This command can only be used by players."
  player-not-found: "%prefix%<#FF6B6B>Player not found."

reload:
  config-success: "%prefix%<#3DDC97>Configuration reloaded."
  alerts-success: "%prefix%<#3DDC97>Alerts reloaded."
  all-success: "%prefix%<#3DDC97>Configuration and data reloaded."

chat:
  no-reply-target: "%prefix%<#FF6B6B>No one to reply to."
  msg-sent: "<#9b94a6>[<#F0F8FF>→ %target_prefix%%target_altname%%target_suffix%<#9b94a6>]<#F0F8FF> %message%"
  msg-received: "<#9b94a6>[<#F0F8FF>%sender_prefix%%sender_altname%%sender_suffix% →<#9b94a6>]<#F0F8FF> %message%"
  reply-sent: "<#9b94a6>[<#F0F8FF>→ %target_prefix%%target_altname%%target_suffix%<#9b94a6>]<#F0F8FF> %message% <#888888>(↩ \"%quoted%\")"
  reply-received: "<#9b94a6>[<#F0F8FF>%sender_prefix%%sender_altname%%sender_suffix% →<#9b94a6>]<#F0F8FF> %message% <#888888>(↩ \"%quoted%\")"

welcome:
  returning: "<#1E90FF>Welcome back, <#F0F8FF>%sender_prefix%%sender_altname%%sender_suffix%<#1E90FF>!"
  newbie: "<#FFB800>Welcome to the server, <#F0F8FF>%sender_prefix%%sender_altname%%sender_suffix%<#FFB800>! Use <#3DDC97>/help<#FFB800> to get started."

join-leave:
  join: "<#3DDC97>+<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix% <#9b94a6>joined the server"
  newbie: "<#FFB800>★<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix% <#9b94a6>joined the server for the first time!"
  leave: "<#FF6B6B>-<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix% <#9b94a6>left the server"

death:
  groups:
    default:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% died"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% has fallen"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% met their fate"
    by_player:
      messages:
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> was slain by <#FFB800>%killer%"
        - "<#FFB800>%killer%<#9b94a6> defeated <#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%"
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> couldn't survive <#FFB800>%killer%"
    by_player_weapon:
      messages:
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> was slain by <#FFB800>%killer%<#9b94a6> using <#F0F8FF>%weapon%"
        - "<#FFB800>%killer%<#9b94a6> defeated <#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> with <#F0F8FF>%weapon%"
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> couldn't survive <#FFB800>%killer%<#9b94a6> and their <#F0F8FF>%weapon%"
    by_fall:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% fell from a high place"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% couldn't handle the fall damage"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% forgot they couldn't fly"
    by_fire:
      messages:
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> burned to death"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% was consumed by flames"
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> felt the heat"
    by_lava:
      messages:
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> tried to swim in lava"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% discovered lava is not water"
        - "<#FF6B6B>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> took a lava bath"
    by_drowning:
      messages:
        - "<#1E90FF>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> drowned"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% forgot to breathe"
        - "<#1E90FF>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> ran out of air"
    by_explosion:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% blew up"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% was blown to pieces"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% didn't respect the blast radius"
    by_void:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% fell into the void"
        - "<#888888>%sender_prefix%%sender_altname%%sender_suffix% disappeared into the abyss"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% said goodbye to the world"
    by_entity:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% was killed by a <#FF6B6B>%killer%"
        - "<#FF6B6B>%killer%<#9b94a6> ended %sender_prefix%%sender_altname%%sender_suffix%'s journey"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% was no match for <#FF6B6B>%killer%"
    by_magic:
      messages:
        - "<#C780FA>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> was killed by magic"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% was victim of sorcery"
    by_wither:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% withered away"
        - "<#888888>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> succumbed to wither"
    by_starve:
      messages:
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% starved to death"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% forgot to eat"
    by_lightning:
      messages:
        - "<#FFB800>%sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> was struck by lightning"
        - "<#9b94a6>%sender_prefix%%sender_altname%%sender_suffix% had a shocking experience"

advancement:
  task: "<#9b94a6>[<#3DDC97>Advancement<#9b94a6>]<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> has made the advancement <#F0F8FF>[<#3DDC97>%title%<#F0F8FF>]"
  goal: "<#9b94a6>[<#1E90FF>Advancement<#9b94a6>]<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> has reached the goal <#1E90FF>[<#F0F8FF>%title%<#1E90FF>]"
  challenge: "<#9b94a6>[<#FFB800>Advancement<#9b94a6>]<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix%<#9b94a6> has completed the challenge <#FFB800>[<#F0F8FF>%title%<#FFB800>]"
