chat:
  no-permission: "<red>You don't have permission to use this."
  no-target: "<red>Player not found."
  no-reply-target: "<red>No one to reply to."
  reload-success: "<green>Chat configuration reloaded."
  only-players: "<red>Only players can use this command."
  msg-sent: "<gray>[<white>→ %target%</white>]</gray> <white>%message%</white>"
  msg-received: "<gray>[<white>%sender% →</white>]</gray> <white>%message%</white>"
  reply-sent: "<gray>[<white>→ %target%</white>]</gray> <white>%message%</white> <dark_gray>(↩ \"%quoted%\")</dark_gray>"
  reply-received: "<gray>[<white>%sender% →</white>]</gray> <white>%message%</white> <dark_gray>(↩ \"%quoted%\")</dark_gray>"

join-leave:
  join: "<green>+</green> <white>%player%</white> <gray>joined the server</gray>"
  leave: "<red>-</red> <white>%player%</white> <gray>left the server</gray>"

death:
  groups:
    default:
      messages:
        - "<gray>%player% died"
        - "<gray>%player% has fallen"
        - "<gray>%player% met their fate"
    by_player:
      messages:
        - "<red>%player%</red> <gray>was slain by</gray> <gold>%killer%</gold>"
        - "<gold>%killer%</gold> <gray>defeated</gray> <red>%player%</red>"
        - "<red>%player%</red> <gray>couldn't survive</gray> <gold>%killer%</gold>"
    by_fall:
      messages:
        - "<gray>%player% fell from a high place"
        - "<gray>%player% couldn't handle the fall damage"
        - "<gray>%player% forgot they couldn't fly"
    by_fire:
      messages:
        - "<red>%player%</red> <gray>burned to death"
        - "<gray>%player% was consumed by flames"
        - "<red>%player%</red> <gray>felt the heat"
    by_lava:
      messages:
        - "<red>%player%</red> <gray>tried to swim in lava"
        - "<gray>%player% discovered lava is not water"
        - "<red>%player%</red> <gray>took a lava bath"
    by_drowning:
      messages:
        - "<aqua>%player%</aqua> <gray>drowned"
        - "<gray>%player% forgot to breathe"
        - "<aqua>%player%</aqua> <gray>ran out of air"
    by_explosion:
      messages:
        - "<gray>%player% blew up"
        - "<gray>%player% was blown to pieces"
        - "<gray>%player% didn't respect the blast radius"
    by_void:
      messages:
        - "<gray>%player% fell into the void"
        - "<dark_gray>%player% disappeared into the abyss"
        - "<gray>%player% said goodbye to the world"
    by_entity:
      messages:
        - "<gray>%player% was killed by a <red>%killer%</red>"
        - "<red>%killer%</red> <gray>ended %player%'s journey"
        - "<gray>%player% was no match for <red>%killer%</red>"
    by_magic:
      messages:
        - "<light_purple>%player%</light_purple> <gray>was killed by magic"
        - "<gray>%player% was victim of sorcery"
    by_wither:
      messages:
        - "<gray>%player% withered away"
        - "<dark_gray>%player%</dark_gray> <gray>succumbed to wither"
    by_starve:
      messages:
        - "<gray>%player% starved to death"
        - "<gray>%player% forgot to eat"
    by_lightning:
      messages:
        - "<yellow>%player%</yellow> <gray>was struck by lightning"
        - "<gray>%player% had a shocking experience"

advancement:
  task: "<gray>[</gray><green>Advancement</green><gray>]</gray> <white>%player%</white> <gray>has made the advancement</gray> <white>[</white>%title%<white>]</white>"
  goal: "<gray>[</gray><aqua>Advancement</aqua><gray>]</gray> <white>%player%</white> <gray>has reached the goal</gray> <aqua>[</aqua>%title%<aqua>]</aqua>"
  challenge: "<gray>[</gray><gold>Advancement</gold><gray>]</gray> <white>%player%</white> <gray>has completed the challenge</gray> <gold>[</gold>%title%<gold>]</gold>"
