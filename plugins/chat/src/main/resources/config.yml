config-version: "0.0.1-alpha"

chat:
  global:
    enabled: true
    prefix: "!"
    format: "##PlayerPrefix## <#1E90FF>[G]<#F0F8FF> %player% <#9b94a6>»<#F0F8FF> %message%"
  local:
    enabled: true
    format: "##PlayerPrefix## <#F0F8FF>%player% <#9b94a6>»<#F0F8FF> %message%"
    default-radius: 100
    worlds:
      world:
        radius: 100
      world_nether:
        radius: 50
      world_the_end:
        radius: -1
  private:
    enabled: true

join-leave:
  join:
    enabled: true
  newbie:
    enabled: true
  leave:
    enabled: true

welcome:
  enabled: true
  newbie:
    enabled: true
    priority-first: false

death:
  enabled: true

advancement:
  enabled: true
  disable-vanilla: true

alerts:
  enabled: true
  interval: 300
  no-repeat-count: 3
  messages:
    - "<#FFB800>[!]<#F0F8FF> Welcome to the server! Use <#3DDC97>/help<#F0F8FF> for commands."
    - "<#FFB800>[!]<#F0F8FF> Enjoy your stay and follow the rules!"
    - "<#FFB800>[!]<#F0F8FF> Have fun and play fair!"
