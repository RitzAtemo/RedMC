config-version: "0.0.1-alpha"

chat:
  global:
    enabled: true
    prefix: "!"
    format: "<#1E90FF>[G]<#F0F8FF> %sender_prefix%%sender_altname%%sender_suffix% <#9b94a6>»<#F0F8FF> %message%"
  local:
    enabled: true
    format: "<#F0F8FF>%sender_prefix%%sender_altname%%sender_suffix% <#9b94a6>»<#F0F8FF> %message%"
    default-radius: 100
    worlds:
      world:
        radius: 100
      world_nether:
        radius: 50
      world_the_end:
        radius: -1
  private:
    enabled: true

join-leave:
  join:
    enabled: true
  newbie:
    enabled: true
  leave:
    enabled: true

welcome:
  enabled: true
  newbie:
    enabled: true
    priority-first: false

death:
  enabled: true

advancement:
  enabled: true
  disable-vanilla: true

alerts:
  enabled: true
  interval: 300
  no-repeat-count: 3
  messages:
    - "<#FFB800>[!]<#F0F8FF> Добро пожаловать на сервер! Используй <#3DDC97>/help<#F0F8FF> для поиска команд."
    - "<#FFB800>[!]<#F0F8FF> Соблюдайте правила и будьте дружелюбны!"
    - "<#FFB800>[!]<#F0F8FF> Веселитесь и получайте удовольствие!"
