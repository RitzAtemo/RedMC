name: RedMC-Tab
description: RedMC-Tab
version: '0.0.1-alpha'
api-version: '1.21.11'
prefix: RedMC
folia-supported: true
main: red.aviora.redmc.tab.TabPlugin
bootstrapper: red.aviora.redmc.tab.TabBootstrap
dependencies:
  server:
    RedMC-API:
      load: BEFORE
      required: true
      join-classpath: true
    RedMC-Placeholders:
      load: BEFORE
      required: true
      join-classpath: true
    RedMC-Vault:
      load: BEFORE
      required: false
      join-classpath: true
permissions:
  redmc.tab:
    default: op
  redmc.tab.reload:
    default: op
  redmc.tab.reload.config:
    default: op
  redmc.tab.reload.all:
    default: op
