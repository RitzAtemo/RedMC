config-version: "0.0.1-alpha"

header:
  animation: true
  interval: 100
  frames:
    - "<#1E90FF>═══ AvioraRed SMP ═══\n<#F0F8FF>Players: ##CurrentServerOnline##/##ServerOnlineMaximum##"
    - "<#FF1493>═══ AvioraRed SMP ═══\n<#F0F8FF>Players: ##CurrentServerOnline##/##ServerOnlineMaximum##"

footer:
  animation: false
  interval: 20
  frames:
    - "<#9b94a6>play.aviora.red"

player-row:
  format: "<#1E90FF>%player_prefix%%player_altname%%player_suffix%"
  interval: 20
